<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SnapMovie | Gasho ama Is-diiwaangeli</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./js/supabase.js"></script>
</head>
<body class="auth-page-premium">
    <div class="auth-bg-overlay"></div>
    
    <main class="auth-wrapper-premium">
        <div class="auth-glass-card fade-in">
            <header class="auth-header">
                <h1 class="auth-logo">SNAP<span>MOVIE</span></h1>
                <h2 id="auth-title">Gasho</h2>
                <p id="auth-subtitle">Ku soo dhawaaw SnapMovie! Fadlan gasho akoonkaaga.</p>
            </header>

            <form id="auth-form" class="auth-form-premium">
                <div class="form-group-premium" id="name-group" style="display: none;">
                    <input type="text" id="auth-name" placeholder="Magacaaga" class="auth-input">
                </div>
                <div class="form-group-premium">
                    <input type="email" id="auth-email" placeholder="Email-ka" required class="auth-input">
                </div>
                <div class="form-group-premium">
                    <input type="password" id="auth-password" placeholder="Furaha (Password)" required class="auth-input">
                </div>
                <button type="submit" id="auth-submit-btn" class="btn-auth-neon-glow">GASHO</button>
                <p id="auth-error" class="error-msg-premium"></p>
            </form>

            <footer class="auth-links-premium">
                <div class="auth-toggle-premium">
                    <p id="toggle-text">Ma haysatid akoon? <a href="#" id="toggle-auth">Is-diiwaangeli</a></p>
                </div>
                <div class="auth-back-home">
                    <a href="./index.html" class="link-back-home">← Ku laabo Guriga</a>
                </div>
            </footer>
        </div>
    </main>

    <script src="./js/auth.js"></script>
</body>
</html>
